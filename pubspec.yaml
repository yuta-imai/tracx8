name: tracx8
description: Vehicle data logger with OBD-II (ELM327), GPS, and accelerometer.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Bluetooth Classic (SPP) for ELM327
  flutter_bluetooth_serial: ^0.4.0

  # GPS
  geolocator: ^13.0.2
  permission_handler: ^11.3.1

  # Accelerometer
  sensors_plus: ^6.1.1

  # File storage
  path_provider: ^2.1.5

  # State management
  provider: ^6.1.2

  # Utilities
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
